spring:
  application:
    name: core-mopo-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

  logging:
    level:
      org.hibernate.SQL: ERROR

  cors:
    allowed:
      origins: ${CORS_ALLOWED_ORIGINS}

  java:
    tool:
      options: -Xms128m -Xmx512m

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: core-mopo-service

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:database
    driver-class-name: org.h2.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}

  jpa:
    # hibernate:
    #   ddl-auto: create-drop usar quando tiver anotacoes de entidade, para criar as tabelas automaticamente
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      data-locations: classpath:data-h2.sql

  h2:
    console:
      enabled: true
      path: /h2

  logging:
    level:
      root: DEBUG

cors:
  allowed:
    origins: ${CORS_ALLOWED_ORIGINS}
